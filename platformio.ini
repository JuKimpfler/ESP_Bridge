; ============================================================
;  PlatformIO  –  ESP32-C3 UART-Bridge via ESP-NOW
;  Seeed Studio XIAO ESP32-C3
; ============================================================

[platformio]
default_envs = uart_bridge

; ------------------------------------------------------------
;  Gemeinsame Einstellungen
; ------------------------------------------------------------
[common]
platform          = espressif32
board             = seeed_xiao_esp32c3
framework         = arduino
build_flags       =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
monitor_speed     = 115200
monitor_filters   = colorize, time
upload_speed      = 921600

; ------------------------------------------------------------
;  Bridge-Firmware (beide Roboter-ESPs, identische Firmware)
; ------------------------------------------------------------
[env:uart_bridge]
extends           = common

; Bibliotheken (alle im ESP32-Arduino-Core enthalten)
; lib_deps =   ; keine externen Libs benötigt

; Optional: automatisch nach dem Flash öffnen
; monitor_port    = COM3   ; ← anpassen falls nötig

; ------------------------------------------------------------
;  Debug-Monitor-Firmware (dritter ESP, per USB an PC)
;
;  Empfaengt Debug-Daten von beiden Bridge-ESPs und gibt sie
;  auf der USB-Serial-Konsole aus. Sendet KEINE Daten zurueck.
;
;  Flashen:  pio run -e debug_monitor --target upload
;  Monitor:  pio device monitor -e debug_monitor
; ------------------------------------------------------------
[env:debug_monitor]
extends           = common
build_src_filter  = -<*> +<../src_debug/>
